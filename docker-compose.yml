# Local full-stack (Issue #16 + #17): Nginx → API + PostgreSQL + Redis + Mailpit
#
#   cp .env.example .env
#   docker compose up --build
#
# Public API (via Nginx): http://localhost/api/v1/...
# Health: http://localhost/health/live
# Mailpit UI: http://localhost:8025
#
# If ports 80/5432/6379 are busy, stop conflicting containers first.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  mail:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  api:
    build:
      context: .
      target: runner
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      # Compose network hostnames (override any localhost values from .env)
      NODE_ENV: production
      PORT: "3000"
      TRUST_PROXY: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_service
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mail
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      APP_URL: http://localhost
      CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mail:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health/live',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 50s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
