# Local full-stack (Issue #16): API + PostgreSQL + Redis + Mailpit
#
#   cp .env.example .env
#   docker compose up --build
#
# Health: http://localhost:3000/health/live
# Mailpit UI: http://localhost:8025
#
# If ports 5432/6379 are busy (e.g. older auth-pg / auth-redis containers), stop them first:
#   docker stop auth-pg auth-redis

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  mail:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  api:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Compose network hostnames (override any localhost values from .env)
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_service
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mail
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mail:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health/live',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 50s

volumes:
  pgdata:
