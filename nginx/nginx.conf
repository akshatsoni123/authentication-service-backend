# Nginx reverse proxy for authentication-service (Issue #17)
#
# Public entry: port 80 → upstream api:3000
# Paths are forwarded unchanged (/api/v1/..., /health/..., /metrics)
#
# HTTPS: see docs/DEPLOYMENT.md — uncomment the ssl server block and mount certs.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Compress JSON API responses
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types application/json text/plain application/javascript;
  gzip_min_length 256;

  # Align with express.json limit (10kb) + small headroom
  client_max_body_size 16k;

  upstream auth_api {
    server api:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name localhost;

    # Health probes — no caching, forward correlation id
    location /health/ {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      access_log off;
    }

    location = /health {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      access_log off;
    }

    # Prometheus scrape — restrict by network / allowlist in production
    location /metrics {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Versioned API — URI path unchanged (/api/v1/...)
    location /api/ {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
    }

    location / {
      return 404;
    }
  }

  # --- TLS (production) — enable after placing certs in nginx/certs/ ---
  # server {
  #   listen 443 ssl http2;
  #   server_name auth.example.com;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #
  #   location /health/ { ... same proxy_set_header blocks as :80 ... }
  #   location /api/    { ... }
  # }
}
