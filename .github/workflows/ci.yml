name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d auth_service_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_service_test
      REDIS_URL: redis://localhost:6379/1

      JWT_ACCESS_SECRET: ci-access-secret-change-me-32chars-min!!xxxxxxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-32chars-min!!xxxxxxxx
      JWT_ACCESS_EXPIRES_IN: "900"
      JWT_REFRESH_EXPIRES_IN: "604800"

      CORS_ORIGIN: http://localhost:3000

      # Email sending is mocked in API tests, but config requires these.
      SMTP_HOST: localhost
      SMTP_FROM: CI <noreply@example.com>

      BCRYPT_SALT_ROUNDS: "10"

      # Keep RL windows small so the login rate-limit test is reliable.
      RL_LOGIN_MAX: "5"
      RL_LOGIN_WINDOW_SEC: "60"
      RL_FORGOT_MAX: "50"
      RL_FORGOT_WINDOW_SEC: "60"
      RL_REGISTER_MAX: "100"
      RL_REGISTER_WINDOW_SEC: "3600"
      RL_RESEND_MAX: "50"
      RL_RESEND_WINDOW_SEC: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build . -t authentication-service:ci

